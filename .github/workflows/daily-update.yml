name: Daily Repository Update

on:
  schedule:
    - cron: '30 5 * * *'   # Daily at 05:30 UTC
  workflow_dispatch:

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f3002888@ds.study.iitm.ac.in"

      - name: 23f3002888@ds.study.iitm.ac.in - Create Daily Commit
        run: |
          echo "Last updated on $(date -u)" > daily_status.txt
          git add daily_status.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes"
          git push
